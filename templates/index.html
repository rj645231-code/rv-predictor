{% extends "base.html" %}
{% set active = "home" %}
{% block title %}RV Predictor — Home{% endblock %}
{% block xs %}
<style>
/* ── KPI CARDS ── */
.kpi{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px}
.kb{background:var(--c1);border:1px solid var(--br);border-radius:var(--r);padding:14px 10px;text-align:center}
.kl{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--t2);margin-bottom:6px}
.kv{font-family:var(--fm);font-size:26px;font-weight:700;line-height:1}
.ks{font-size:10px;color:var(--t2);margin-top:3px}
/* ── MANDI CARDS ── */
.mc{background:var(--c1);border:1px solid var(--br);border-radius:var(--r);margin-bottom:10px;cursor:pointer;transition:border-color 0.2s}
.mc.on{border-color:var(--amber)}
.mt{display:flex;align-items:center;gap:11px;padding:14px 16px}
.mrk{width:28px;height:28px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-size:12px;font-weight:700;flex-shrink:0}
.r1{background:linear-gradient(135deg,var(--amber),#f97316);color:#000}
.r2{background:rgba(220,220,220,0.1);color:#999}
.r3{background:rgba(180,100,30,0.15);color:#cd7f32}
.r0{background:var(--c3);color:var(--t2)}
.mi{flex:1;min-width:0}
.mn{font-size:15px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mm{font-size:11px;color:var(--t2);margin-top:2px}
.mr2{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.sb{display:flex;align-items:center;gap:8px;padding:0 16px 12px}
.st{flex:1;height:3px;background:var(--br);border-radius:2px;overflow:hidden}
.sf{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--green),var(--amber));transition:width 0.8s ease}
.sn{font-family:var(--fm);font-size:11px;font-weight:700;color:var(--amber);min-width:24px;text-align:right}
.det{display:none;border-top:1px solid var(--br);padding:14px 16px}
.det.open{display:block;animation:up 0.22s ease}
/* ── DETAIL CARDS ── */
.h4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.hb{background:var(--c2);border:1px solid var(--br);border-radius:var(--rs);padding:10px 6px;text-align:center}
.hb.hi{border-color:var(--amber);background:rgba(245,158,11,0.06)}
.ht{font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--t2);margin-bottom:4px}
.hp{font-family:var(--fm);font-size:13px;font-weight:700;margin-bottom:3px;line-height:1.1}
.hr{font-size:11px;font-weight:700;margin-bottom:4px}
.hcb{height:2px;background:var(--br);border-radius:1px;overflow:hidden;margin-bottom:2px}
.hcf{height:100%;background:var(--blue);border-radius:1px}
.hct{font-size:8px;color:var(--t3)}
.sg2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.sg{border-radius:var(--rs);padding:11px 12px;border:1px solid}
.sl{font-size:8px;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;opacity:0.65}
.sv{font-size:11px;font-weight:700;line-height:1.3}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.gb{background:var(--c2);border:1px solid var(--br);border-radius:var(--rs);padding:10px 6px;text-align:center}
.gtl{font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--t2);margin-bottom:6px}
.gw{position:relative;width:56px;height:56px;margin:0 auto 5px}
.gw svg{position:absolute;inset:0;transform:rotate(-90deg)}
.gc{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.gn{font-family:var(--fm);font-size:12px;font-weight:700}
.gd{font-size:9px;color:var(--t2)}
/* ── SPREAD ── */
.sp-wrap{background:var(--c1);border:1px solid var(--br);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.sp-hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 16px 12px;border-bottom:1px solid var(--br)}
.sp-item{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid var(--br)}
.sp-item:last-child{border-bottom:none}
.sp-name{font-size:12px;font-weight:700;width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
.sp-track{flex:1;height:6px;background:var(--br);border-radius:3px;overflow:hidden}
.sp-fill{height:100%;border-radius:3px}
.sp-price{font-family:var(--fm);font-size:12px;font-weight:700;min-width:62px;text-align:right;flex-shrink:0}
.best-tag{display:inline-block;background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.3);border-radius:20px;padding:1px 7px;font-size:9px;font-weight:700;color:var(--green);font-family:var(--fm);margin-left:4px;vertical-align:middle}
/* ── HEATMAP ── */
.hm-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.hmc{border-radius:var(--rs);padding:14px;border:1px solid}
.hmn{font-size:13px;font-weight:800;margin-bottom:4px}
.hmp{font-family:var(--fm);font-size:26px;font-weight:700;line-height:1;margin-bottom:4px}
.hmb{height:4px;border-radius:2px;margin-bottom:6px}
.hmw{font-size:11px;font-weight:700}
.hmpr{font-size:11px;color:rgba(255,255,255,0.45);margin-top:3px}
.no-crash{background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);border-radius:var(--r);padding:22px;text-align:center}

/* ══ BIG PLAYER SECTION ══ */
.bp-wrap{background:var(--c1);border:1px solid var(--br);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.bp-insight{background:rgba(245,158,11,0.07);border-bottom:1px solid rgba(245,158,11,0.15);padding:12px 16px;display:flex;gap:10px;align-items:flex-start}
.bp-insight-icon{font-size:20px;flex-shrink:0;margin-top:1px}
.bp-insight-text{font-size:11px;color:var(--t2);line-height:1.6}
.bp-insight-text b{color:var(--amber);font-weight:700}
.bp-filters{display:flex;gap:6px;padding:10px 14px;border-bottom:1px solid var(--br);flex-wrap:wrap}
.bp-fsel{padding:6px 10px;background:var(--c2);border:1px solid var(--br);border-radius:var(--rs);color:var(--txt);font-family:var(--fn);font-size:11px;font-weight:600;outline:none;cursor:pointer;appearance:none}
.bp-fsel:focus{border-color:var(--amber)}
.bp-table-wrap{overflow-x:auto}
.bp-table{width:100%;border-collapse:collapse;font-size:11px}
.bp-table th{padding:8px 12px;text-align:left;font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--t2);border-bottom:1px solid var(--br);white-space:nowrap;font-weight:600}
.bp-table td{padding:10px 12px;border-bottom:1px solid var(--br);vertical-align:middle}
.bp-table tr:last-child td{border-bottom:none}
.bp-table tr:hover td{background:rgba(255,255,255,0.02)}
.bp-player{font-weight:800;font-size:12px}
.bp-mandi{font-size:10px;color:var(--t2);margin-top:2px}
.bp-price{font-family:var(--fm);font-weight:700;font-size:13px}
.bp-qty{font-family:var(--fm);font-size:12px;color:var(--t2)}
.bp-date{font-size:10px;color:var(--t3)}
.bp-diff{font-family:var(--fm);font-size:11px;font-weight:700}
.bp-signal{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:0.5px;white-space:nowrap}
.bp-bull{background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.3);color:var(--green)}
.bp-bear{background:rgba(244,63,94,0.1);border:1px solid rgba(244,63,94,0.25);color:var(--red)}
.bp-note{font-size:10px;color:var(--t2);font-style:italic;max-width:160px}
.bp-empty{padding:30px;text-align:center;color:var(--t2);font-size:12px}

/* ══ NEWS SECTION ══ */
.news-wrap{background:var(--c1);border:1px solid var(--br);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.news-loading{padding:30px;text-align:center;color:var(--t2);font-size:12px;display:flex;align-items:center;justify-content:center;gap:10px}
.news-card{border-bottom:1px solid var(--br);padding:14px 16px;transition:background 0.15s}
.news-card:last-child{border-bottom:none}
.news-card:hover{background:rgba(255,255,255,0.02)}
.news-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
.news-title{font-size:13px;font-weight:800;line-height:1.35;flex:1}
.news-tag{flex-shrink:0;display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:0.5px}
.tag-bull{background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.3);color:var(--green)}
.tag-bear{background:rgba(244,63,94,0.1);border:1px solid rgba(244,63,94,0.25);color:var(--red)}
.tag-neut{background:rgba(148,163,184,0.1);border:1px solid rgba(148,163,184,0.2);color:var(--t2)}
.news-meta{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.news-src{font-size:9px;font-weight:700;color:var(--amber);letter-spacing:0.5px;text-transform:uppercase}
.news-date{font-size:9px;color:var(--t3)}
.news-cat{font-size:9px;color:var(--t3);background:var(--c2);border-radius:10px;padding:1px 7px}
.news-summary{font-size:11px;color:var(--t2);line-height:1.6;margin-bottom:8px}
.news-link{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--amber);font-weight:700;text-decoration:none}
.news-link:hover{text-decoration:underline}
.news-refresh{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-top:1px solid var(--br);background:var(--c2)}
.news-refresh-btn{background:var(--amber);color:#000;border:none;border-radius:var(--rs);padding:6px 14px;font-size:11px;font-weight:800;cursor:pointer;font-family:var(--fn)}
.news-ts{font-size:9px;color:var(--t3)}
</style>
{% endblock %}

{% block content %}
<div id="root"><div class="ld"><div class="sp" style="width:28px;height:28px;border:3px solid #1c2b40;border-top-color:#f59e0b;border-radius:50%;animation:spin 0.7s linear infinite"></div>Loading...</div></div>
{% endblock %}

{% block scripts %}
<script>
let SIG=[];let OC=null;let CH={};let BP_DATA=[];let NEWS_DATA=[];

async function init(){
  try{
    const[sr,spr,hmr,bpr]=await Promise.all([
      fetch('/api/signals').then(r=>r.json()),
      fetch('/api/spread').then(r=>r.json()),
      fetch('/api/heatmap').then(r=>r.json()),
      fetch('/api/bigplayers').then(r=>r.json()).catch(()=>[]),
    ]);
    SIG=sr.data||[];
    BP_DATA=Array.isArray(bpr)?bpr:[];
    render(SIG,spr,hmr);
    // Load news async after main content
    loadNews();
  }catch(e){
    document.getElementById('root').innerHTML='<div class="er">Could not load data. Is Flask running?</div>';
  }
}

function render(sigs,spread,hm){
  const buy=sigs.filter(r=>r.entry&&r.entry.includes('BUY TODAY')).length;
  const wait=sigs.filter(r=>r.entry&&r.entry.includes('WAIT')).length;
  const avoid=sigs.filter(r=>(r.plan&&r.plan.includes('AVOID'))||(r.entry&&r.entry.includes('AVOID'))).length;
  document.getElementById('root').innerHTML=`
    <div class="kpi an">
      <div class="kb"><div class="kl">Buy Today</div><div class="kv pos">${buy}</div><div class="ks">mandis</div></div>
      <div class="kb"><div class="kl">Wait</div><div class="kv neu">${wait}</div><div class="ks">mandis</div></div>
      <div class="kb"><div class="kl">Avoid</div><div class="kv neg">${avoid}</div><div class="ks">mandis</div></div>
    </div>
    <div class="sec">Top 5 — Best to Buy Today</div>
    ${sigs.slice(0,5).map((r,i)=>mcard(r,i)).join('')}
    <div class="sec">Price Spread — Cheapest to Costliest</div>
    ${rspread(spread)}
    <div class="sec">⚠️ Crash Risk Alert — Danger Mandis Only</div>
    ${rheatmap(hm)}
    <div class="sec">🏢 Big Player Buying Activity</div>
    ${rbigplayer(BP_DATA)}
    <div class="sec">📰 Mustard Market News</div>
    <div id="news-root" class="news-wrap">
      <div class="news-loading">
        <div class="sp" style="width:18px;height:18px;border:2px solid #1c2b40;border-top-color:#f59e0b;border-radius:50%;animation:spin 0.7s linear infinite"></div>
        Fetching latest market news...
      </div>
    </div>`;
}

/* ══ BIG PLAYER SECTION ══ */
function rbigplayer(data){
  const avgMkt=SIG.length?SIG.reduce((s,r)=>s+Number(r.price||0),0)/SIG.length:5800;
  const mandis=[...new Set(data.map(r=>r.mandi))].sort();
  const dates=[...new Set(data.map(r=>r.date))].sort().reverse();

  return`<div class="bp-wrap an">
    <div class="bp-insight">
      <div class="bp-insight-icon">💡</div>
      <div class="bp-insight-text">
        <b>What Big Player Buying Means:</b><br>
        When large companies buy <b>above market price</b> → they expect prices to rise (<span style="color:var(--green)">Bullish</span>).
        When they buy <b>below market</b> → bearish pressure on rates (<span style="color:var(--red)">Bearish</span>).
        Heavy bulk buying = reduced supply at mandis = prices tend to rise in 7–14 days.
      </div>
    </div>
    <div class="bp-filters">
      <select class="bp-fsel" id="bp-date" onchange="filterbp()">
        <option value="">All Dates</option>
        ${dates.map(d=>`<option value="${d}">${d}</option>`).join('')}
      </select>
      <select class="bp-fsel" id="bp-mandi" onchange="filterbp()">
        <option value="">All Mandis</option>
        ${mandis.map(m=>`<option value="${m}">${m}</option>`).join('')}
      </select>
      <select class="bp-fsel" id="bp-signal" onchange="filterbp()">
        <option value="">All Signals</option>
        <option value="bull">🟢 Bullish Only</option>
        <option value="bear">🔴 Bearish Only</option>
      </select>
      <select class="bp-fsel" id="bp-price" onchange="filterbp()">
        <option value="">All Prices</option>
        <option value="0-5500">Below ₹5,500</option>
        <option value="5500-5800">₹5,500 – ₹5,800</option>
        <option value="5800-6000">₹5,800 – ₹6,000</option>
        <option value="6000-99999">Above ₹6,000</option>
      </select>
    </div>
    <div class="bp-table-wrap">
      <table class="bp-table" id="bp-table">
        <thead>
          <tr>
            <th>Company / Player</th>
            <th>Buy Price</th>
            <th>vs Market</th>
            <th>Signal</th>
            <th>Qty (qtl)</th>
            <th>Date</th>
            <th>Note</th>
          </tr>
        </thead>
        <tbody id="bp-body">
          ${bprows(data, avgMkt)}
        </tbody>
      </table>
    </div>
  </div>`;
}

function bprows(data, avgMkt){
  if(!data.length) return`<tr><td colspan="7" class="bp-empty">No big player data available.<br><small style="color:var(--t3)">Add entries to data/big_players.json</small></td></tr>`;
  return data.map(r=>{
    const mkt=avgMkt||5800;
    const diff=r.buy_price-mkt;
    const pct=(diff/mkt*100).toFixed(1);
    const bull=diff>=0;
    const diffStr=(diff>=0?'+':'')+Math.round(diff);
    const pctStr=(diff>=0?'+':'')+pct+'%';
    return`<tr>
      <td><div class="bp-player">${r.player}</div><div class="bp-mandi">📍 ${r.mandi}</div></td>
      <td><div class="bp-price ${bull?'pos':'neg'}">₹${Number(r.buy_price).toLocaleString('en-IN')}</div></td>
      <td><div class="bp-diff ${bull?'pos':'neg'}">${diffStr} (${pctStr})</div></td>
      <td><span class="bp-signal ${bull?'bp-bull':'bp-bear'}">${bull?'▲ BULLISH':'▼ BEARISH'}</span></td>
      <td><div class="bp-qty">${Number(r.quantity).toLocaleString('en-IN')} q</div></td>
      <td><div class="bp-date">${r.date}</div></td>
      <td><div class="bp-note">${r.note||'—'}</div></td>
    </tr>`;
  }).join('');
}

function filterbp(){
  const avgMkt=SIG.length?SIG.reduce((s,r)=>s+Number(r.price||0),0)/SIG.length:5800;
  const fdate=document.getElementById('bp-date')?.value||'';
  const fmandi=document.getElementById('bp-mandi')?.value||'';
  const fsig=document.getElementById('bp-signal')?.value||'';
  const fpr=document.getElementById('bp-price')?.value||'';
  let data=BP_DATA;
  if(fdate) data=data.filter(r=>r.date===fdate);
  if(fmandi) data=data.filter(r=>r.mandi===fmandi);
  if(fsig){
    data=data.filter(r=>{
      const bull=(r.buy_price-avgMkt)>=0;
      return fsig==='bull'?bull:!bull;
    });
  }
  if(fpr){
    const [lo,hi]=fpr.split('-').map(Number);
    data=data.filter(r=>r.buy_price>=lo&&r.buy_price<=hi);
  }
  const tbody=document.getElementById('bp-body');
  if(tbody) tbody.innerHTML=bprows(data,avgMkt);
}

/* ══ NEWS SECTION ══ */
async function loadNews(refresh=false){
  const el=document.getElementById('news-root');
  if(!el)return;
  if(refresh){
    el.innerHTML='<div class="news-loading"><div class="sp" style="width:18px;height:18px;border:2px solid #1c2b40;border-top-color:#f59e0b;border-radius:50%;animation:spin 0.7s linear infinite"></div>Fetching fresh news via AI...</div>';
  }
  try{
    const res=await fetch('/api/news').then(r=>r.json());
    NEWS_DATA=res.news||[];
    renderNews(NEWS_DATA);
  }catch(e){
    el.innerHTML='<div class="news-loading" style="flex-direction:column;gap:6px">⚠️ News unavailable<br><small style="color:var(--t3)">Add /api/news endpoint or check connection</small></div>';
  }
}

function renderNews(news){
  const el=document.getElementById('news-root');
  if(!el)return;
  if(!news.length){
    el.innerHTML='<div class="news-loading">No news found.</div>';
    return;
  }
  const ts=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  el.innerHTML=
    news.map(n=>newscard(n)).join('')+
    `<div class="news-refresh">
      <div class="news-ts">Updated at ${ts}</div>
      <button class="news-refresh-btn" onclick="loadNews(true)">🔄 Refresh</button>
    </div>`;
}

function newscard(n){
  const tag=n.sentiment==='bullish'
    ?'<span class="news-tag tag-bull">▲ Bullish</span>'
    :n.sentiment==='bearish'
    ?'<span class="news-tag tag-bear">▼ Bearish</span>'
    :'<span class="news-tag tag-neut">◆ Neutral</span>';
  const catMap={'policy':'📋 Policy','weather':'🌦 Weather','export':'🚢 Export/Import','price':'💰 Prices','edible_oil':'🫙 Edible Oil','general':'📰 General'};
  const catLabel=catMap[n.category]||'📰 General';
  const impact=n.sentiment==='bullish'
    ?`<div style="font-size:10px;color:var(--green);margin-top:4px;font-weight:700">📈 Impact: Could push mustard prices UP</div>`
    :n.sentiment==='bearish'
    ?`<div style="font-size:10px;color:var(--red);margin-top:4px;font-weight:700">📉 Impact: Could push mustard prices DOWN</div>`
    :'';
  return`<div class="news-card">
    <div class="news-top">
      <div class="news-title">${n.title}</div>
      ${tag}
    </div>
    <div class="news-meta">
      <span class="news-src">${n.source||'Market News'}</span>
      <span class="news-date">${n.date||''}</span>
      <span class="news-cat">${catLabel}</span>
    </div>
    <div class="news-summary">${n.summary}</div>
    ${impact}
    ${n.url?`<a class="news-link" href="${n.url}" target="_blank" rel="noopener">Read full story →</a>`:''}
  </div>`;
}

/* ══ EXISTING FUNCTIONS (unchanged) ══ */
function mcard(r,i){
  const rc=['r1','r2','r3','r0'][Math.min(i,3)];
  const cl=pc(r.entry);const si=ss(r.entry);
  const sw=Math.round(r.score/10*100);const id='m'+i;
  return`<div class="mc an" id="${id}" style="animation-delay:${i*0.06}s" onclick="tog('${id}','${encodeURIComponent(r.mandi)}',${i})">
    <div class="mt">
      <div class="mrk ${rc}">${i+1}</div>
      <div class="mi"><div class="mn">${r.mandi}</div><div class="mm">${fp(r.price)} &nbsp;·&nbsp; ${r.regime||''}</div></div>
      <div class="mr2"><span class="pill ${cl}">${si}</span><span style="font-family:var(--fm);font-size:11px;color:var(--amber)">${r.score}/10</span></div>
    </div>
    <div class="sb"><div class="st"><div class="sf" style="width:${sw}%"></div></div><div class="sn">${r.score}</div></div>
    <div class="det" id="d${id}"></div>
  </div>`;
}

async function tog(id,em,idx){
  const card=document.getElementById(id);const det=document.getElementById('d'+id);
  if(card.classList.contains('on')){card.classList.remove('on');det.classList.remove('open');if(CH[id]){CH[id].destroy();delete CH[id];}OC=null;return;}
  if(OC){document.getElementById(OC)?.classList.remove('on');document.getElementById('d'+OC)?.classList.remove('open');if(CH[OC]){CH[OC].destroy();delete CH[OC];}}
  OC=id;card.classList.add('on');
  det.innerHTML='<div style="text-align:center;color:var(--t2);padding:12px;font-size:12px">Loading chart...</div>';
  det.classList.add('open');
  const mandi=decodeURIComponent(em);
  const r=SIG.find(x=>x.mandi===mandi)||SIG[idx];
  const hist=await fetch('/api/history/'+encodeURIComponent(mandi)+'?days=90').then(x=>x.json()).catch(()=>({dates:[],prices:[],arrivals:[]}));
  det.innerHTML=bdet(r,hist,id);
  setTimeout(()=>mchart(hist,r,'ch'+id,id),60);
  setTimeout(()=>card.scrollIntoView({behavior:'smooth',block:'nearest'}),80);
}

function bdet(r,h,id){
  const hh=[
    {t:'1d',p:r.pred1,rt:r.ret1,c:r.conf1,pr:false},
    {t:'3d',p:r.pred3,rt:r.ret3,c:r.conf3,pr:false},
    {t:'7d',p:r.pred7,rt:r.ret7,c:r.conf7,pr:false},
    {t:'14d',p:r.pred14,rt:r.ret14,c:r.conf14,pr:true},
  ].map(h=>`<div class="hb${h.pr?' hi':''}"><div class="ht">${h.t}${h.pr?' ✅':''}</div><div class="hp">${fp(h.p)}</div><div class="hr ${rc(h.rt)}">${fr(h.rt)}</div><div class="hcb"><div class="hcf" style="width:${h.c||0}%"></div></div><div class="hct">${h.c||0}%</div></div>`).join('');
  const ec=r.entry?.includes('BUY TODAY')?'var(--green)':r.entry?.includes('WAIT')?'var(--t2)':'var(--red)';
  const pc2=r.plan?.includes('STRONG BUY')?'var(--amber)':r.plan?.includes('BUY')?'var(--green)':r.plan?.includes('AVOID')?'var(--red)':'var(--t2)';
  const crash=Number(r.crash)||0;const arr=Number(r.arrival)||1;const score=Number(r.score)||0;
  const cc=crash>50?'var(--red)':crash>30?'#f97316':'var(--green)';
  const ac=arr>1.5?'var(--red)':arr<0.6?'var(--cyan)':'var(--green)';
  return`<div class="h4">${hh}</div>
    <div class="sg2">
      <div class="sg" style="background:${ec}18;border-color:${ec}44;color:${ec}"><div class="sl">Entry (1d)</div><div class="sv">${r.entry||'—'}</div></div>
      <div class="sg" style="background:${pc2}18;border-color:${pc2}44;color:${pc2}"><div class="sl">Planning (14d)</div><div class="sv">${r.plan||'—'}</div></div>
    </div>
    <div class="g3">${gauge('Crash',crash+'%',cc,crash)}${gauge('Arrival',arr.toFixed(1)+'x',ac,Math.min(arr/2.5*100,100))}${gauge('Score',score+'/10','var(--amber)',score*10)}</div>
    <div class="cw"><div class="cl">90-Day Price + Arrivals + AI Forecast</div><canvas id="ch${id}" height="120"></canvas></div>`;
}

function gauge(title,val,color,pct){
  const R=20,C=2*Math.PI*R,off=C-(Math.min(pct,100)/100)*C;
  const desc=title==='Crash'?(pct>50?'High risk':pct>30?'Moderate':'Low'):title==='Arrival'?(Number(val)>1.5?'Heavy supply':Number(val)<0.6?'Thin supply':'Normal'):(pct/10>=7?'Strong buy':pct/10>=5?'Neutral':'Avoid');
  return`<div class="gb"><div class="gtl">${title}</div><div class="gw"><svg viewBox="0 0 56 56"><circle cx="28" cy="28" r="${R}" fill="none" stroke="var(--br)" stroke-width="5"/><circle cx="28" cy="28" r="${R}" fill="none" stroke="${color}" stroke-width="5" stroke-linecap="round" stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" style="transition:stroke-dashoffset 0.8s ease"/></svg><div class="gc"><div class="gn" style="color:${color};font-size:11px">${val}</div></div></div><div class="gd">${desc}</div></div>`;
}

function mchart(hist,r,cid,cardId){
  const canvas=document.getElementById(cid);if(!canvas)return;
  const hp=hist.prices||[];
  const fd=[...new Array(Math.max(hp.length-1,0)).fill(null),hp[hp.length-1]||null,r.pred1,r.pred3,r.pred7,r.pred14];
  const labels=[...(hist.dates||[]).map(d=>d.slice(5)),'+1d','+3d','+7d','+14d'];
  const arrd=[...(hist.arrivals||[]),null,null,null,null];
  CH[cardId]=new Chart(canvas.getContext('2d'),{
    data:{labels,datasets:[
      {type:'line',label:'Price',data:[...hp,null,null,null,null],borderColor:'#3b82f6',borderWidth:2,pointRadius:0,tension:0.35,fill:false,yAxisID:'y'},
      {type:'line',label:'Forecast',data:fd,borderColor:'#f59e0b',borderWidth:2.5,borderDash:[6,4],pointRadius:(c)=>c.dataIndex>=hp.length?5:0,pointBackgroundColor:'#f59e0b',tension:0.3,fill:false,yAxisID:'y'},
      {type:'bar',label:'Arrival',data:arrd,backgroundColor:'rgba(34,211,238,0.18)',borderRadius:2,yAxisID:'y2'},
    ]},
    options:{responsive:true,interaction:{intersect:false,mode:'index'},
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#0b1120',borderColor:'#1c2b40',borderWidth:1,
        callbacks:{label:c=>c.dataset.label==='Arrival'?` Arr:${c.raw??'—'}q`:` ₹${c.raw!=null?Number(c.raw).toLocaleString('en-IN',{maximumFractionDigits:0}):'—'}`}}},
      scales:{
        x:{grid:{color:'#1c2b40'},ticks:{maxTicksLimit:7,maxRotation:0}},
        y:{position:'left',grid:{color:'#1c2b40'},ticks:{callback:v=>'₹'+Number(v).toLocaleString('en-IN',{maximumFractionDigits:0})}},
        y2:{position:'right',grid:{display:false},ticks:{callback:v=>v+'q'}}
      }}
  });
}

function rspread(s){
  if(!s||s.error)return`<div class="er">${s?.error||'No data'}</div>`;
  const ms=s.mandis||[];
  if(!ms.length)return'<div class="er">No spread data available</div>';
  const minP=ms[0].price;const maxP=ms[ms.length-1].price;const range=maxP-minP||1;
  const rows=ms.map((r,i)=>{
    const pct=Math.max(Math.round((r.price-minP)/range*100),1);
    const isMin=i===0;const isMax=i===ms.length-1;
    const col=isMin?'var(--green)':isMax?'var(--red)':pct>70?'#f97316':'var(--amber)';
    return`<div class="sp-item">
      <div class="sp-name">${r.mandi}${isMin?'<span class="best-tag">BEST</span>':''}</div>
      <div class="sp-track"><div class="sp-fill" style="width:${pct}%;background:${col}"></div></div>
      <div class="sp-price ${isMin?'pos':isMax?'neg':'acc'}">${fp(r.price)}</div>
    </div>`;
  }).join('');
  return`<div class="sp-wrap">
    <div class="sp-hdr">
      <div><div style="font-size:10px;color:var(--t2);margin-bottom:3px">Cheapest today — Buy here</div><div style="font-size:17px;font-weight:800;color:var(--green)">${s.cheapest?.mandi||ms[0]?.mandi||'—'}</div></div>
      <div style="text-align:right"><div style="font-size:10px;color:var(--t2);margin-bottom:3px">Total price gap</div><div style="font-family:var(--fm);font-size:22px;font-weight:700;color:var(--red)">₹${s.spread||0}</div></div>
    </div>
    ${rows}
  </div>`;
}

function rheatmap(hm){
  const danger=(hm||[]).filter(r=>Number(r.crash)>50).sort((a,b)=>b.crash-a.crash);
  if(!danger.length){
    return`<div class="no-crash"><div style="font-size:28px;margin-bottom:8px">✅</div><div style="font-size:15px;font-weight:800;color:var(--green)">All Clear — No Danger Mandis</div><div style="font-size:12px;color:var(--t2);margin-top:5px">No mandi has crash risk above 50% today</div></div>`;
  }
  return`<div class="hm-grid">${danger.map(r=>{
    const c=r.crash;
    const fc=c>75?'var(--red)':'#f97316';
    const bg=c>75?'rgba(244,63,94,0.12)':'rgba(249,115,22,0.1)';
    const bc=c>75?'rgba(244,63,94,0.35)':'rgba(249,115,22,0.3)';
    const warn=c>75?'🔴 VERY HIGH RISK':'🟠 HIGH RISK';
    return`<div class="hmc" style="background:${bg};border-color:${bc}">
      <div class="hmn">${r.mandi}</div>
      <div class="hmp" style="color:${fc}">${Number(c).toFixed(0)}%</div>
      <div class="hmb" style="width:100%;background:${bc};position:relative"><div style="height:100%;width:${c}%;background:${fc};border-radius:2px"></div></div>
      <div class="hmw" style="color:${fc}">${warn}</div>
      <div style="font-size:10px;font-weight:700;color:var(--red);margin-top:3px">⛔ Do NOT buy today</div>
      <div class="hmpr">${fp(r.price)}</div>
    </div>`;
  }).join('')}</div>`;
}

init();
</script>
{% endblock %}
